; MCLite — MeshCore Companion Firmware for LilyGo T-Deck Plus
; PlatformIO Build Configuration

[env:tdeck_plus]
platform = espressif32@6.11.0
board = esp32-s3-devkitc-1
framework = arduino

; Flash & memory
board_build.flash_size = 16MB
board_build.partitions = partitions/partitions.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB

; PSRAM
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; LVGL config
    -DRADIOLIB_GODMODE
    -DMAX_CONTACTS=32
    -DMAX_GROUP_CHANNELS=16
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -I src
    -I .
    -I .pio/libdeps/tdeck_plus/MeshCore/lib/ed25519
    ; T-Deck Plus pin definitions
    -DTDECK_SPI_MOSI=41
    -DTDECK_SPI_MISO=38
    -DTDECK_SPI_SCK=40
    -DTDECK_TFT_CS=12
    -DTDECK_TFT_DC=11
    -DTDECK_TFT_BL=42
    -DTDECK_TFT_RST=-1
    -DTDECK_SD_CS=39
    -DTDECK_LORA_CS=9
    -DTDECK_LORA_RST=17
    -DTDECK_LORA_DIO1=45
    -DTDECK_LORA_BUSY=13
    -DTDECK_KB_I2C_ADDR=0x55
    -DTDECK_KB_SDA=18
    -DTDECK_KB_SCL=8
    -DTDECK_TRACKBALL_UP=3
    -DTDECK_TRACKBALL_DOWN=15
    -DTDECK_TRACKBALL_LEFT=1
    -DTDECK_TRACKBALL_RIGHT=2
    -DTDECK_TRACKBALL_CLICK=0
    -DTDECK_BAT_ADC=4
    -DTDECK_GPS_RX=44
    -DTDECK_GPS_TX=43
    -DTDECK_GPS_BAUD=38400
    -DTDECK_POWER_EN=10
    ; LoRa pin aliases for MeshCore CustomSX1262::std_init()
    -DP_LORA_NSS=9
    -DP_LORA_SCLK=40
    -DP_LORA_MISO=38
    -DP_LORA_MOSI=41
    ; LoRa defaults for MeshCore CustomSX1262 (overridden at runtime)
    -DLORA_FREQ=869.618
    -DLORA_BW=62.5
    -DLORA_SF=8
    -DLORA_TX_POWER=22
    -DLORA_CR=8
    ; SX1262 hardware config
    -DSX126X_DIO3_TCXO_VOLTAGE=1.8f
    -DSX126X_DIO2_AS_RF_SWITCH=false
    -DSX126X_CURRENT_LIMIT=140
    -DSX126X_RX_BOOSTED_GAIN=1
    ; I2S Speaker
    -DTDECK_I2S_WS=5
    -DTDECK_I2S_BCK=7
    -DTDECK_I2S_DOUT=6
    ; Touchscreen (GT911, shares I2C bus with keyboard on SDA=18, SCL=8)
    -DTDECK_TOUCH_INT=16

extra_scripts =
    pre:setup_hooks.py
    post:merge_firmware.py

monitor_speed = 115200

lib_ldf_mode = deep+

lib_deps =
    lvgl/lvgl@^8.4.0
    lovyanGFX@^1.1.16
    bblanchon/ArduinoJson@^7.0.0
    jgromes/RadioLib@7.3.0
    mikalhart/TinyGPSPlus@^1.1.0
    densaugeo/base64@^1.4.0
    bitbank2/PNGdec@^1.0.3
    https://github.com/meshcore-dev/MeshCore.git#792f299986619aa62dad937f717d21e9d1b1882b

; ── Native unit tests (runs on host, no ESP32 needed) ──
[env:native_test]
platform = native
build_flags =
    -std=c++17
    -DMAX_CONTACTS=32
    -DUNIT_TEST
    -I test/stubs
    -I src
extra_scripts = pre:setup_hooks.py
test_framework = unity
test_filter = test_native/*
build_src_filter = -<*>
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
